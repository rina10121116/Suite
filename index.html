<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --bg: #12111B;
    --panel: #1C1A28;
    --panel-2: #22203180;
    --border: #322C46;
    --gold: #C9A961;
    --gold-soft: #E3C98A;
    --cream: #EDE7DA;
    --muted: #8B8598;
    --green: #8FBB8A;
    --rose: #D98080;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Noto Sans JP', sans-serif;
    margin: 0;
    padding: 0;
  }
  body {
    padding: 20px 14px 60px;
    padding-top: max(20px, env(safe-area-inset-top));
    padding-bottom: max(60px, env(safe-area-inset-bottom));
  }
  .gothic { font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .header-title { font-size: 20px; font-weight: 700; letter-spacing: 0.04em; }
  .header-title-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; margin-top: 2px; }
  .save-indicator { font-size: 11px; color: var(--muted); min-width: 60px; text-align: right; }

  .month-nav { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 18px; }
  .month-nav-btn { background: var(--panel); border: 1px solid var(--border); color: var(--gold-soft); width: 32px; height: 32px; border-radius: 8px; font-size: 16px; cursor: pointer; }
  .month-nav-label { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 17px; letter-spacing: 0.06em; min-width: 120px; text-align: center; }

  .summary-card {
    position: relative;
    background: linear-gradient(160deg, #241f33 0%, #1a1725 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 18px 18px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .glass-icon { position: absolute; top: 10px; right: 10px; width: 56px; height: 56px; color: var(--gold); opacity: 0.35; }
  .summary-eyebrow { font-size: 11px; letter-spacing: 0.14em; color: var(--gold-soft); margin-bottom: 6px; }
  .summary-main { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .summary-main-value { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 46px; font-weight: 700; color: var(--gold-soft); line-height: 1; }
  .summary-main-unit { font-size: 14px; color: var(--muted); }
  .summary-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat-chip { background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 8px 6px; text-align: center; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.08s ease, border-color 0.08s ease; }
  .stat-chip:active { transform: scale(0.96); border-color: var(--gold); }
  .stat-chip-value { font-size: 15px; font-weight: 700; color: var(--cream); }
  .stat-chip-unit { font-size: 10px; color: var(--muted); margin-left: 2px; }
  .stat-chip-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(8, 7, 12, 0.7); z-index: 50; align-items: flex-end; justify-content: center; }
  .modal-backdrop.open { display: flex; }
  .modal-panel { background: var(--panel); border: 1px solid var(--border); border-bottom: none; border-radius: 18px 18px 0 0; width: 100%; max-width: 520px; max-height: 78vh; overflow-y: auto; padding: 16px 16px calc(16px + env(safe-area-inset-bottom)); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
  .modal-title { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 16px; color: var(--gold-soft); letter-spacing: 0.03em; }
  .modal-sum { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .modal-note { font-size: 10px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
  .modal-list { display: flex; flex-direction: column; }
  .breakdown-row { display: flex; align-items: baseline; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-date { font-size: 11px; color: var(--muted); min-width: 52px; }
  .breakdown-name { flex: 1; font-size: 13px; color: var(--cream); }
  .breakdown-value { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 13px; color: var(--gold-soft); white-space: nowrap; }
  .breakdown-empty { text-align: center; color: var(--muted); font-size: 12px; padding: 24px 0; }

  .day-card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
  .day-card.off { opacity: 0.55; }
  .day-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .day-head-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .day-date { background: transparent; border: none; color: var(--cream); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; }
  .day-weekday { font-size: 11px; color: var(--muted); background: #322C4650; padding: 2px 7px; border-radius: 6px; }
  .day-weekday.weekend { color: var(--rose); }
  .nibu-tag { font-size: 10px; color: var(--gold-soft); border: 1px solid var(--gold); border-radius: 6px; padding: 1px 6px; }
  .day-head-right { display: flex; align-items: center; gap: 10px; }
  .day-total { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 16px; color: var(--gold-soft); }
  .icon-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; padding: 4px; font-size: 15px; }
  .day-body { padding: 12px; }
  .day-meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: flex-end; }

  .field { display: flex; flex-direction: column; gap: 3px; }
  .field-label { font-size: 10px; color: var(--muted); }
  .field-input-wrap { display: flex; align-items: center; background: #14121e; border: 1px solid var(--border); border-radius: 8px; padding: 5px 8px; }
  .field-input { background: transparent; border: none; color: var(--cream); width: 56px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif; }
  .field-input:focus { outline: none; }
  .field-suffix { font-size: 10px; color: var(--muted); }

  .toggle { display: flex; align-items: center; gap: 6px; background: #14121e; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; color: var(--muted); }
  .toggle-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .toggle.on { border-color: var(--gold); color: var(--cream); }
  .toggle.on .toggle-dot { background: var(--gold); }
  .toggle-label { font-size: 12px; }
  .toggle-points { font-size: 11px; margin-left: 2px; color: var(--gold-soft); }

  .customer-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
  .customer-card { background: #171522; border: 1px solid var(--border); border-radius: 12px; padding: 10px; }
  .customer-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .customer-name { flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--cream); font-size: 14px; padding: 4px 2px; font-family: 'Noto Sans JP', sans-serif; }
  .customer-name:focus { outline: none; border-color: var(--gold); }
  .customer-sum { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 14px; color: var(--gold-soft); white-space: nowrap; }
  .type-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .type-chip { flex: 1; min-width: 56px; background: #14121e; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 4px; font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .type-chip-pt { font-size: 9px; opacity: 0.8; }
  .type-chip.on { border-color: var(--gold); color: var(--gold-soft); background: #2a2438; }
  .customer-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .shukyaku-badge { margin-top: 8px; display: inline-block; font-size: 10px; color: var(--green); border: 1px solid var(--green); border-radius: 6px; padding: 2px 6px; }

  .day-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .ghost-btn { display: flex; align-items: center; gap: 5px; background: transparent; border: 1px dashed var(--border); color: var(--gold-soft); border-radius: 8px; padding: 7px 12px; font-size: 12px; cursor: pointer; }
  .ghost-btn.danger { color: var(--rose); }

  .day-subtotal-strip { display: flex; flex-wrap: wrap; gap: 10px; font-size: 10px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 8px; }

  .add-day-btn { width: 100%; background: var(--panel); border: 1px solid var(--gold); color: var(--gold-soft); border-radius: 12px; padding: 12px; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; margin-top: 6px; }

  .empty-state { text-align: center; color: var(--muted); font-size: 13px; padding: 30px 10px; border: 1px dashed var(--border); border-radius: 12px; margin-bottom: 14px; }

  .footnote { font-size: 10px; color: var(--muted); text-align: center; margin-top: 18px; line-height: 1.6; }
</style>
</head>
<body>
  <div class="header">
    <div>
      <div class="header-title gothic">換算ポイント計算</div>
      <div class="header-title-sub">POINT LEDGER</div>
    </div>
    <div class="save-indicator" id="saveIndicator"></div>
  </div>

  <div class="month-nav">
    <button class="month-nav-btn" id="prevMonth">‹</button>
    <div class="month-nav-label gothic" id="monthLabel"></div>
    <button class="month-nav-btn" id="nextMonth">›</button>
  </div>

  <div class="summary-card">
    <svg viewBox="0 0 64 64" class="glass-icon" aria-hidden="true">
      <g opacity="0.5">
        <path d="M20 6 L44 6 L37 30 Q32 34 27 30 Z" fill="none" stroke="currentColor" stroke-width="1.3" />
        <line x1="32" y1="32" x2="32" y2="48" stroke="currentColor" stroke-width="1.3" />
        <line x1="22" y1="50" x2="42" y2="50" stroke="currentColor" stroke-width="1.3" />
        <path d="M12 6 L28 6 L23 22 Q18 25 14 22 Z" fill="none" stroke="currentColor" stroke-width="1" opacity="0.6" />
        <path d="M36 6 L52 6 L47 22 Q42 25 38 22 Z" fill="none" stroke="currentColor" stroke-width="1" opacity="0.6" />
      </g>
    </svg>
    <div class="summary-eyebrow">今月の換算</div>
    <div class="summary-main">
      <span class="summary-main-value gothic" id="conversionValue">0.0</span>
      <span class="summary-main-unit" id="conversionUnit">換算 / 出勤0日</span>
    </div>
    <div class="summary-sub" id="summarySub">合計 0.0pt（うちワイン 0.0pt）</div>
    <div class="stat-grid" id="statGrid"></div>
  </div>

  <div id="daysContainer"></div>

  <button class="add-day-btn" id="addDayBtn">＋ 出勤日を追加</button>

  <div class="footnote">
    ワインは月内合計額から4万円ごとに2.0ptで自動計算されます（端数切り捨て）。<br>
    換算は 合計pt ÷ 出勤日数 を0.5pt単位に切り捨てて算出しています。<br>
    入力内容はこの端末のブラウザに月ごと自動保存されます（このページ単体で完結します）。
  </div>

  <div class="modal-backdrop" id="breakdownBackdrop">
    <div class="modal-panel">
      <div class="modal-header">
        <div class="modal-title gothic" id="breakdownTitle"></div>
        <button class="icon-btn" id="breakdownClose">✕</button>
      </div>
      <div class="modal-sum" id="breakdownSum"></div>
      <div class="modal-note" id="breakdownNote"></div>
      <div class="modal-list" id="breakdownList"></div>
    </div>
  </div>

<script>
(function () {
  "use strict";

  var WEEKDAYS = ["日", "月", "火", "水", "木", "金", "土"];
  var TYPE_OPTIONS = ["なし", "同伴", "本指名", "指名", "場内"];
  var TYPE_POINTS = { "なし": 0, "同伴": 2.0, "本指名": 1.0, "指名": 0.5, "場内": 0.5 };

  function uid() { return Math.random().toString(36).slice(2, 10); }

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }

  function monthKeyFromDate(dateStr) { return dateStr.slice(0, 7); }

  function weekdayOf(dateStr) {
    if (!dateStr) return "";
    var d = new Date(dateStr + "T00:00:00");
    if (isNaN(d.getTime())) return "";
    return WEEKDAYS[d.getDay()];
  }

  function isNibuDay(dateStr) {
    var w = weekdayOf(dateStr);
    return w === "月" || w === "土";
  }

  function emptyCustomer() {
    return { id: uid(), name: "", type: "なし", reservation: false, event: 0, wine: 0, nibu: 0, rikka: 0, nyukai: false };
  }

  function emptyDay(dateStr) {
    return { id: uid(), date: dateStr, worked: true, workHours: 0, salesPoints: 0, customers: [emptyCustomer()] };
  }

  function customerPoints(c) {
    var typePt = TYPE_POINTS[c.type] || 0;
    var reservationPt = c.reservation ? 0.5 : 0;
    var eventPt = Number(c.event) || 0;
    var nibuPt = Number(c.nibu) || 0;
    var rikkaPt = Number(c.rikka) || 0;
    var nyukaiPt = c.nyukai ? 4.0 : 0;
    var shukyaku = (c.type === "同伴" || c.type === "本指名") ? 1 : 0;
    var sum = typePt + reservationPt + eventPt + nibuPt + rikkaPt + nyukaiPt;
    return { typePt: typePt, reservationPt: reservationPt, eventPt: eventPt, nibuPt: nibuPt, rikkaPt: rikkaPt, nyukaiPt: nyukaiPt, shukyaku: shukyaku, sum: sum };
  }

  function dayTotals(day) {
    var sum = 0, event = 0, nibu = 0, rikka = 0, reservation = 0, nyukai = 0, shukyaku = 0, wine = 0;
    var typeSums = { "同伴": 0, "本指名": 0, "指名": 0, "場内": 0 };
    day.customers.forEach(function (c) {
      var p = customerPoints(c);
      sum += p.sum; event += p.eventPt; nibu += p.nibuPt; rikka += p.rikkaPt;
      reservation += p.reservationPt; nyukai += p.nyukaiPt; shukyaku += p.shukyaku;
      wine += Number(c.wine) || 0;
      if (typeSums[c.type] !== undefined) typeSums[c.type] += TYPE_POINTS[c.type];
    });
    var salesPoints = Number(day.salesPoints) || 0;
    return { sum: sum + salesPoints, event: event, nibu: nibu, rikka: rikka, reservation: reservation, nyukai: nyukai, shukyaku: shukyaku, wine: wine, salesPoints: salesPoints, typeSums: typeSums };
  }

  function monthSummary(days) {
    var acc = { sum: 0, event: 0, nibu: 0, rikka: 0, reservation: 0, nyukai: 0, shukyaku: 0, wine: 0, salesPoints: 0, typeSums: { "同伴": 0, "本指名": 0, "指名": 0, "場内": 0 }, workedDays: 0 };
    days.forEach(function (day) {
      var t = dayTotals(day);
      acc.sum += t.sum; acc.event += t.event; acc.nibu += t.nibu; acc.rikka += t.rikka;
      acc.reservation += t.reservation; acc.nyukai += t.nyukai; acc.shukyaku += t.shukyaku;
      acc.wine += t.wine; acc.salesPoints += t.salesPoints;
      Object.keys(acc.typeSums).forEach(function (k) { acc.typeSums[k] += t.typeSums[k]; });
      if (day.worked) acc.workedDays += 1;
    });
    var winePoints = Math.floor(acc.wine / 4) * 2.0;
    var grandTotal = acc.sum + winePoints;
    var conversion = acc.workedDays > 0 ? Math.floor((grandTotal / acc.workedDays) * 2) / 2 : 0;
    acc.winePoints = winePoints; acc.grandTotal = grandTotal; acc.conversion = conversion;
    return acc;
  }

  function fmt(n) {
    var v = Math.round((Number(n) || 0) * 100) / 100;
    return v.toFixed(1);
  }

  // ---------- State ----------
  var state = { monthKey: monthKeyFromDate(todayStr()), days: [] };
  var openDays = {}; // dayId -> true if explicitly opened by the user in this session. Default (absent) = closed.
  var saveTimer = null;

  function storageKey(monthKey) { return "kyabakura:month:" + monthKey; }

  function loadMonth(monthKey) {
    try {
      var raw = localStorage.getItem(storageKey(monthKey));
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  }

  function saveMonth() {
    var indicator = document.getElementById("saveIndicator");
    indicator.textContent = "保存中…";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function () {
      try {
        localStorage.setItem(storageKey(state.monthKey), JSON.stringify(state.days));
        localStorage.setItem("kyabakura:last-month", state.monthKey);
        indicator.textContent = "保存済み";
        setTimeout(function () { indicator.textContent = ""; }, 1200);
      } catch (e) {
        indicator.textContent = "保存に失敗しました";
      }
    }, 400);
  }

  function switchMonth(monthKey) {
    state.monthKey = monthKey;
    state.days = loadMonth(monthKey);
    render();
  }

  // ---------- Rendering ----------
  function render() {
    var y = state.monthKey.split("-")[0];
    var m = state.monthKey.split("-")[1];
    document.getElementById("monthLabel").textContent = y + "年 " + Number(m) + "月";

    var summary = monthSummary(state.days);
    document.getElementById("conversionValue").textContent = fmt(summary.conversion);
    document.getElementById("conversionUnit").textContent = "換算 / 出勤" + summary.workedDays + "日";
    document.getElementById("summarySub").textContent = "合計 " + fmt(summary.grandTotal) + "pt（うちワイン " + fmt(summary.winePoints) + "pt）";

    var stats = [
      ["同伴", summary.typeSums["同伴"], ""],
      ["本指名", summary.typeSums["本指名"], ""],
      ["指名", summary.typeSums["指名"], ""],
      ["場内", summary.typeSums["場内"], ""],
      ["予約", summary.reservation, ""],
      ["イベント", summary.event, ""],
      ["六花", summary.rikka, ""],
      ["入会", summary.nyukai, ""],
      ["売上pt", summary.salesPoints, ""],
      ["集客換算", summary.shukyaku, "人"],
      ["ワイン計", summary.wine, "万円"],
      ["ワインpt", summary.winePoints, ""]
    ];
    var statGrid = document.getElementById("statGrid");
    statGrid.innerHTML = stats.map(function (s) {
      return '<div class="stat-chip" data-key="' + s[0] + '" data-unit="' + s[2] + '"><div class="stat-chip-value">' + fmt(s[1]) + '<span class="stat-chip-unit">' + s[2] + '</span></div><div class="stat-chip-label">' + s[0] + '</div></div>';
    }).join("");
    Array.prototype.forEach.call(statGrid.querySelectorAll(".stat-chip"), function (chip) {
      chip.addEventListener("click", function () {
        openBreakdown(chip.dataset.key, chip.dataset.unit);
      });
    });

    var container = document.getElementById("daysContainer");
    if (state.days.length === 0) {
      container.innerHTML = '<div class="empty-state">まだこの月の記録がありません。<br>「出勤日を追加」から始めましょう。</div>';
      return;
    }
    container.innerHTML = "";
    state.days.forEach(function (day, dayIdx) {
      container.appendChild(renderDayCard(day, dayIdx));
    });
  }

  function renderDayCard(day, dayIdx) {
    var t = dayTotals(day);
    var w = weekdayOf(day.date);
    var nibuAllowed = isNibuDay(day.date);

    var card = document.createElement("div");
    card.className = "day-card" + (day.worked ? "" : " off");

    card.innerHTML =
      '<div class="day-head">' +
        '<div class="day-head-left">' +
          '<input type="date" class="day-date" value="' + day.date + '">' +
          '<span class="day-weekday' + (w === "土" || w === "日" ? " weekend" : "") + '">' + w + '曜</span>' +
          (nibuAllowed ? '<span class="nibu-tag">二部対象日</span>' : "") +
        '</div>' +
        '<div class="day-head-right">' +
          '<div class="day-total gothic">' + fmt(t.sum) + ' pt</div>' +
          '<button class="icon-btn toggle-open">▾</button>' +
        '</div>' +
      '</div>' +
      '<div class="day-body">' +
        '<div class="day-meta-row"></div>' +
        '<div class="customer-list"></div>' +
        '<div class="day-actions">' +
          '<button class="ghost-btn add-customer-btn">＋ お客さんを追加</button>' +
          '<button class="ghost-btn danger delete-day-btn">削除 この日を削除</button>' +
        '</div>' +
        '<div class="day-subtotal-strip">' +
          '<span>同伴 ' + fmt(t.typeSums["同伴"]) + '</span>' +
          '<span>本指名 ' + fmt(t.typeSums["本指名"]) + '</span>' +
          '<span>指名 ' + fmt(t.typeSums["指名"]) + '</span>' +
          '<span>場内 ' + fmt(t.typeSums["場内"]) + '</span>' +
          '<span>ワイン ' + fmt(t.wine) + '万円</span>' +
          '<span>集客 ' + t.shukyaku + '</span>' +
        '</div>' +
      '</div>';

    var body = card.querySelector(".day-body");

    // date change
    card.querySelector(".day-date").addEventListener("change", function (e) {
      day.date = e.target.value;
      saveMonth();
      render();
    });

    // toggle open/close (default closed; stays open only if the user opened it this session)
    var toggleBtn = card.querySelector(".toggle-open");
    if (!openDays[day.id]) {
      body.style.display = "none";
      toggleBtn.textContent = "▸";
    }
    toggleBtn.addEventListener("click", function () {
      if (body.style.display === "none") {
        body.style.display = "";
        toggleBtn.textContent = "▾";
        openDays[day.id] = true;
      } else {
        body.style.display = "none";
        toggleBtn.textContent = "▸";
        delete openDays[day.id];
      }
    });

    // meta row: worked toggle, workHours, salesPoints
    var metaRow = card.querySelector(".day-meta-row");
    metaRow.appendChild(makeToggle("出勤日として計上", day.worked, null, function (v) { day.worked = v; saveMonth(); render(); }));
    metaRow.appendChild(makeNumberField("勤務時間", day.workHours, 0.25, "h", function (v) { day.workHours = v; saveMonth(); render(); }));
    metaRow.appendChild(makeNumberField("売上ポイント", day.salesPoints, 0.5, "", function (v) { day.salesPoints = v; saveMonth(); render(); }));

    // customers
    var customerList = card.querySelector(".customer-list");
    day.customers.forEach(function (c, cIdx) {
      customerList.appendChild(renderCustomerCard(c, day, dayIdx, cIdx));
    });

    card.querySelector(".add-customer-btn").addEventListener("click", function () {
      day.customers.push(emptyCustomer());
      saveMonth();
      render();
    });

    card.querySelector(".delete-day-btn").addEventListener("click", function () {
      state.days.splice(dayIdx, 1);
      saveMonth();
      render();
    });

    return card;
  }

  function renderCustomerCard(c, day, dayIdx, cIdx) {
    var p = customerPoints(c);
    var nibuAllowed = isNibuDay(day.date);

    var card = document.createElement("div");
    card.className = "customer-card";

    card.innerHTML =
      '<div class="customer-head">' +
        '<input class="customer-name" placeholder="お客さん名" value="' + escapeAttr(c.name) + '">' +
        '<div class="customer-sum gothic">' + fmt(p.sum) + ' pt</div>' +
        (day.customers.length > 1 ? '<button class="icon-btn delete-customer-btn">✕</button>' : '') +
      '</div>' +
      '<div class="type-row"></div>' +
      '<div class="customer-grid"></div>' +
      ((c.type === "同伴" || c.type === "本指名") ? '<div class="shukyaku-badge">集客換算 +1</div>' : '');

    card.querySelector(".customer-name").addEventListener("input", function (e) {
      c.name = e.target.value;
      saveMonth();
    });

    var delBtn = card.querySelector(".delete-customer-btn");
    if (delBtn) {
      delBtn.addEventListener("click", function () {
        day.customers.splice(cIdx, 1);
        if (day.customers.length === 0) day.customers.push(emptyCustomer());
        saveMonth();
        render();
      });
    }

    var typeRow = card.querySelector(".type-row");
    TYPE_OPTIONS.forEach(function (t) {
      var chip = document.createElement("button");
      chip.type = "button";
      chip.className = "type-chip" + (c.type === t ? " on" : "");
      chip.innerHTML = t + '<span class="type-chip-pt">' + (TYPE_POINTS[t] ? fmt(TYPE_POINTS[t]) : "0") + '</span>';
      chip.addEventListener("click", function () {
        c.type = t;
        saveMonth();
        render();
      });
      typeRow.appendChild(chip);
    });

    var grid = card.querySelector(".customer-grid");
    grid.appendChild(makeToggle("予約", c.reservation, 0.5, function (v) { c.reservation = v; saveMonth(); render(); }));
    grid.appendChild(makeToggle("入会", c.nyukai, 4.0, function (v) { c.nyukai = v; saveMonth(); render(); }));
    grid.appendChild(makeNumberField("イベント", c.event, 0.5, "", function (v) { c.event = v; saveMonth(); render(); }));
    grid.appendChild(makeNumberField("六花", c.rikka, 0.5, "", function (v) { c.rikka = v; saveMonth(); render(); }));
    grid.appendChild(makeNumberField(nibuAllowed ? "二部" : "二部（月・土のみ）", c.nibu, 0.5, "", function (v) { c.nibu = v; saveMonth(); render(); }));
    grid.appendChild(makeNumberField("ワイン", c.wine, 1, "万円", function (v) { c.wine = v; saveMonth(); render(); }));

    return card;
  }

  function makeToggle(label, checked, points, onChange) {
    var btn = document.createElement("button");
    btn.type = "button";
    btn.className = "toggle" + (checked ? " on" : "");
    btn.innerHTML = '<span class="toggle-dot"></span><span class="toggle-label">' + label + '</span>' +
      (points != null ? '<span class="toggle-points">' + (checked ? "+" + fmt(points) : "+0.0") + '</span>' : "");
    btn.addEventListener("click", function () { onChange(!checked); });
    return btn;
  }

  function makeNumberField(label, value, step, suffix, onChange) {
    var wrap = document.createElement("label");
    wrap.className = "field";
    wrap.innerHTML = '<span class="field-label">' + label + '</span>' +
      '<div class="field-input-wrap"><input type="number" class="field-input" value="' + value + '" step="' + step + '" min="0">' +
      (suffix ? '<span class="field-suffix">' + suffix + '</span>' : '') + '</div>';
    var input = wrap.querySelector("input");
    input.addEventListener("focus", function () { input.select(); });
    input.addEventListener("change", function (e) {
      var v = e.target.value === "" ? 0 : parseFloat(e.target.value);
      onChange(v);
    });
    return wrap;
  }

  function escapeAttr(s) {
    return String(s || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function shortDate(dateStr) {
    var parts = dateStr.split("-");
    if (parts.length < 3) return dateStr;
    return Number(parts[1]) + "/" + Number(parts[2]);
  }

  // ---------- Breakdown (stat chip tap) ----------
  function buildBreakdown(days, key) {
    var entries = [];
    days.slice().sort(function (a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; }).forEach(function (day) {
      var w = weekdayOf(day.date);

      if (key === "売上pt") {
        var sv = Number(day.salesPoints) || 0;
        if (sv) entries.push({ date: day.date, weekday: w, name: null, value: sv });
        return;
      }

      if (key === "ワイン計" || key === "ワインpt") {
        day.customers.forEach(function (c) {
          var wv = Number(c.wine) || 0;
          if (wv) entries.push({ date: day.date, weekday: w, name: c.name || "(名前未入力)", value: wv });
        });
        return;
      }

      day.customers.forEach(function (c) {
        var p = customerPoints(c);
        var v = 0;
        if (key === "同伴" || key === "本指名" || key === "指名" || key === "場内") {
          v = c.type === key ? (TYPE_POINTS[key] || 0) : 0;
        } else if (key === "予約") {
          v = p.reservationPt;
        } else if (key === "イベント") {
          v = p.eventPt;
        } else if (key === "六花") {
          v = p.rikkaPt;
        } else if (key === "入会") {
          v = p.nyukaiPt;
        } else if (key === "集客換算") {
          v = p.shukyaku;
        }
        if (v) entries.push({ date: day.date, weekday: w, name: c.name || "(名前未入力)", value: v });
      });
    });
    return entries;
  }

  function openBreakdown(key, unit) {
    var entries = buildBreakdown(state.days, key);
    var total = entries.reduce(function (sum, e) { return sum + e.value; }, 0);

    document.getElementById("breakdownTitle").textContent = key + " の内訳";
    document.getElementById("breakdownSum").textContent = "合計 " + fmt(total) + unit + "（" + entries.length + "件）";

    var noteEl = document.getElementById("breakdownNote");
    if (key === "ワインpt") {
      noteEl.textContent = "ワインptは月間合計額から自動計算のため、内訳は金額（万円）で表示しています。";
      noteEl.style.display = "";
    } else {
      noteEl.textContent = "";
      noteEl.style.display = "none";
    }

    var listEl = document.getElementById("breakdownList");
    if (entries.length === 0) {
      listEl.innerHTML = '<div class="breakdown-empty">この月はまだ記録がありません</div>';
    } else {
      listEl.innerHTML = entries.map(function (e) {
        return '<div class="breakdown-row">' +
          '<div class="breakdown-date">' + shortDate(e.date) + '(' + e.weekday + ')</div>' +
          (e.name ? '<div class="breakdown-name">' + escapeAttr(e.name) + '</div>' : '<div class="breakdown-name"></div>') +
          '<div class="breakdown-value">+' + fmt(e.value) + unit + '</div>' +
        '</div>';
      }).join("");
    }

    document.getElementById("breakdownBackdrop").classList.add("open");
  }

  function closeBreakdown() {
    document.getElementById("breakdownBackdrop").classList.remove("open");
  }

  document.getElementById("breakdownClose").addEventListener("click", closeBreakdown);
  document.getElementById("breakdownBackdrop").addEventListener("click", function (e) {
    if (e.target === e.currentTarget) closeBreakdown();
  });

  // ---------- Init ----------
  function shiftMonth(delta) {
    var parts = state.monthKey.split("-");
    var d = new Date(Number(parts[0]), Number(parts[1]) - 1 + delta, 1);
    switchMonth(d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0"));
  }

  document.getElementById("prevMonth").addEventListener("click", function () { shiftMonth(-1); });
  document.getElementById("nextMonth").addEventListener("click", function () { shiftMonth(1); });

  document.getElementById("addDayBtn").addEventListener("click", function () {
    var last = state.days[state.days.length - 1];
    var nextDate = state.monthKey + "-01";
    if (last) {
      var d = new Date(last.date + "T00:00:00");
      d.setDate(d.getDate() + 1);
      nextDate = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    }
    var newDay = emptyDay(nextDate);
    state.days.push(newDay);
    openDays[newDay.id] = true;
    saveMonth();
    render();
  });

  (function init() {
    var lastMonth = null;
    try { lastMonth = localStorage.getItem("kyabakura:last-month"); } catch (e) {}
    state.monthKey = lastMonth || monthKeyFromDate(todayStr());
    state.days = loadMonth(state.monthKey);
    render();
  })();
})();
</script>
</body>
</html>
